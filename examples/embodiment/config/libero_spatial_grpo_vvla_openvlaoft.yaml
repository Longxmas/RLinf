defaults:
- env/libero_spatial@env.train
- env/libero_spatial@env.eval
- model/openvla_oft@actor.model
- training_backend/fsdp@actor.fsdp_config
- weight_syncer/patch_syncer@weight_syncer
- override hydra/job_logging: stdout
hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
  - file://${oc.env:EMBODIED_PATH}/config/
cluster:
  num_nodes: 1
  component_placement:
    actor,rollout: 0-3
    env: 4-7
runner:
  task_type: embodied
  logger:
    log_path: ../results
    project_name: rlinf
    experiment_name: libero_spatial_grpo_vvla_openvlaoft
    logger_backends:
    - tensorboard
  max_epochs: 1000
  max_steps: -1
  only_eval: false
  val_check_interval: -1
  save_interval: 25
  resume_dir: null
  ckpt_path: null
algorithm:
  normalize_advantages: true
  kl_penalty: kl
  group_size: 8
  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level
  adv_type: grpo
  loss_type: actor
  loss_agg_func: token-mean
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  reward_coef: 5.0
  filter_rewards: true
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5
env:
  group_name: EnvGroup
  train:
    rollout_epoch: 16
    total_num_envs: 64
    group_size: ${algorithm.group_size}
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 512
    reward_coef: ${algorithm.reward_coef}
    reset_gripper_open: false
  eval:
    rollout_epoch: 1
    total_num_envs: 500
    auto_reset: true
    ignore_terminations: true
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 512
    group_size: 1
    reset_gripper_open: false
    is_eval: true
    video_cfg:
      save_video: true
      video_base_dir: ${runner.logger.log_path}/video/eval
rollout:
  sampling_params:
    do_sample: true
    temperature_train: 1.6
    temperature_eval: 1.6
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0
  group_name: RolloutGroup
  generation_backend: huggingface
  enable_offload: true
  pipeline_stage_num: 1
  model:
    model_path: /path/to/model/RLinf-OpenVLAOFT-GRPO-LIBERO-spatial
    precision: ${actor.model.precision}
    model_type: vvla_openvla_oft
    vvla:
      attention: sdpa
actor:
  group_name: ActorGroup
  training_backend: fsdp
  micro_batch_size: 32
  global_batch_size: 16384
  seed: 1234
  enable_offload: true
  model:
    model_path: /path/to/model/RLinf-OpenVLAOFT-GRPO-LIBERO-spatial
    model_type: openvla_oft
    unnorm_key: libero_spatial_no_noops
    max_prompt_length: 128
  optim:
    lr: 2.0e-05
    value_lr: 0.003
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
  fsdp_config:
    strategy: fsdp
    gradient_checkpointing: true
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
reward:
  use_reward_model: false
critic:
  use_critic_model: false
